```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kỷ Niệm Tình Yêu</title>

<style>

body{
margin:0;
font-family: "Segoe UI",sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffd1ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.container{
text-align:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
max-width:800px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.time{
font-size:22px;
margin-top:15px;
}

.counter{
font-size:50px;
font-weight:bold;
margin:20px 0;
}

.gallery{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.gallery img{
width:140px;
height:140px;
object-fit:cover;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:white;
color:#ff4f81;
font-weight:bold;
cursor:pointer;
}

.letter{
margin-top:20px;
display:none;
font-size:18px;
line-height:1.6;
}

.heart{
position:fixed;
bottom:-20px;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1>💖 Kỷ Niệm Tình Yêu 💖</h1>

<div>Bắt đầu từ <b>23 / 09 / 2022</b></div>

<div class="counter" id="days">0</div>

<div class="time" id="time"></div>

<div class="gallery">
<img src="https://picsum.photos/200?1">
<img src="https://picsum.photos/200?2">
<img src="https://picsum.photos/200?3">
<img src="https://picsum.photos/200?4">
</div>

<button onclick="showLetter()">💌 Mở thư</button>

<div class="letter" id="letter">
Cảm ơn vì đã xuất hiện trong cuộc đời anh.  
Từng ngày bên nhau đều là kỷ niệm đẹp.  
Hy vọng chúng ta sẽ còn rất nhiều năm tháng phía trước. ❤️
</div>

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b9e9f3f5.mp3">
</audio>

<script>

const start = new Date("2022-09-23T00:00:00");

function update(){

const now = new Date();

let diff = now - start;

let days = Math.floor(diff/(1000*60*60*24));
let hours = Math.floor(diff/(1000*60*60))%24;
let minutes = Math.floor(diff/(1000*60))%60;
let seconds = Math.floor(diff/1000)%60;

document.getElementById("days").innerText = days + " ngày";

document.getElementById("time").innerText =
hours+" giờ "+minutes+" phút "+seconds+" giây";

}

setInterval(update,1000);
update();


function showLetter(){

const el = document.getElementById("letter");

if(el.style.display=="block"){
el.style.display="none";
}else{
el.style.display="block";
}

}


function heart(){

const h=document.createElement("div");

h.className="heart";
h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*30)+"px";
h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>{h.remove()},6000);

}

setInterval(heart,250);

</script>

</body>
</html>
```
