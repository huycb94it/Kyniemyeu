<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỷ Niệm Yêu Của Chúng Mình</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            /* Nền chuyển màu pastel lãng mạn */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Ẩn thanh cuộn do hiệu ứng trái tim rơi */
            color: #ff4b72;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.2);
            text-align: center;
            z-index: 10;
            max-width: 90%;
            width: 500px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2em;
            margin-bottom: 25px;
            color: #ff4d4d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .avatars {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3);
            transition: transform 0.3s ease;
        }
        .avatar:hover {
            transform: scale(1.1) rotate(5deg);
        }
        .heart-icon {
            font-size: 2.8em;
            color: #ff4d4d;
            /* Hiệu ứng nhịp đập cho trái tim trung tâm */
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .counter {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .time-box {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 80px;
        }
        .time-box span {
            display: block;
            font-size: 1.8em;
            font-weight: 600;
            color: #ff4d4d;
        }
        .time-box p {
            font-size: 0.9em;
            margin-top: 5px;
            color: #666;
            text-transform: uppercase;
        }
        .message {
            margin-top: 30px;
            font-size: 1.2em;
            font-style: italic;
            line-height: 1.6;
        }
        /* CSS cho trái tim rơi sinh động */
        .falling-heart {
            position: fixed;
            top: -10%;
            font-size: 1.5rem;
            color: #ff4d4d;
            opacity: 0.7;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* Đảm bảo giao diện đẹp trên điện thoại */
        @media (max-width: 480px) {
            .counter {
                flex-wrap: wrap;
                gap: 10px;
            }
            .time-box {
                width: 45%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ngày Chung Đôi</h1>
        
        <div class="avatars">
            <img src="https://via.placeholder.com/150/ff9a9e/ffffff?text=Boy" alt="Chàng trai" class="avatar">
            <i class="fas fa-heart heart-icon"></i>
            <img src="https://via.placeholder.com/150/fecfef/ffffff?text=Girl" alt="Cô gái" class="avatar">
        </div>

        <div class="counter">
            <div class="time-box">
                <span id="days">0</span>
                <p>Ngày</p>
            </div>
            <div class="time-box">
                <span id="hours">0</span>
                <p>Giờ</p>
            </div>
            <div class="time-box">
                <span id="minutes">0</span>
                <p>Phút</p>
            </div>
            <div class="time-box">
                <span id="seconds">0</span>
                <p>Giây</p>
            </div>
        </div>

        <div class="message">
            "Yêu không phải là nhìn nhau, mà là cùng nhau nhìn về một hướng."
        </div>
    </div>

    <script>
        // Lấy chính xác mốc thời gian: 00:00:00 ngày 23/09/2022
        const startDate = new Date("2022-09-23T00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - startDate;

            // Tính toán Ngày, Giờ, Phút, Giây
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Cập nhật giao diện (Thêm số 0 đằng trước nếu nhỏ hơn 10)
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Cập nhật mỗi giây
        setInterval(updateTimer, 1000);
        updateTimer(); // Chạy ngay lần đầu để không bị delay 1s

        // HIỆU ỨNG TRÁI TIM RƠI
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("falling-heart");
            heart.innerHTML = "❤";
            
            // Random vị trí xuất hiện theo chiều ngang
            heart.style.left = Math.random() * 100 + "vw";
            
            // Random kích thước trái tim
            const size = Math.random() * 1.2 + 0.5;
            heart.style.transform = `scale(${size})`;
            
            // Random tốc độ rơi
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            
            document.body.appendChild(heart);

            // Xóa thẻ div sau khi hoàn thành chu kỳ rơi để tối ưu bộ nhớ trình duyệt
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Tạo 1 trái tim mới mỗi 400 mili-giây
        setInterval(createHeart, 400);
    </script>
</body>
</html>
